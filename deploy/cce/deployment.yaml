apiVersion: apps/v1
kind: Deployment
metadata:
  name: isbim-web
  namespace: isbim-web
  labels:
    app.kubernetes.io/name: isbim-web
    app.kubernetes.io/part-of: isbim
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: isbim-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: isbim-web
        app.kubernetes.io/part-of: isbim
    spec:
      automountServiceAccountToken: false
      serviceAccountName: isbim-web-swr
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: isbim-official-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: isbim-web-config
            - secretRef:
                name: isbim-web-secret
          startupProbe:
            httpGet:
              path: /api/revalidate
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/revalidate
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/revalidate
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
