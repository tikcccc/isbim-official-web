apiVersion: v1
kind: ConfigMap
metadata:
  name: isbim-web-config
  namespace: isbim-web
  labels:
    app.kubernetes.io/name: isbim-web
    app.kubernetes.io/part-of: isbim
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_SITE_URL: "https://www.isbim.com.hk"
  NEXT_PUBLIC_SANITY_PROJECT_ID: "replace-me"
  NEXT_PUBLIC_SANITY_DATASET: "production"
  NEXT_PUBLIC_SANITY_API_VERSION: "2024-01-01"
  NEXT_PUBLIC_MEDIA_URL: ""
  NEXT_PUBLIC_VIDEO_CDN_URL: "https://replace-me.example.com/videos"
  NEXT_PUBLIC_FEATURE_VIDEO_CDN_URL: "https://replace-me.example.com/assets"
  EMAIL_PROVIDER: "resend"
  CONTACT_EMAIL_TO: "solution@isbim.com.hk"
  EMAIL_FROM_INTERNAL: "isBIM Contact Form <noreply@isbim.com.hk>"
  EMAIL_FROM_USER: "isBIM <noreply@isbim.com.hk>"
