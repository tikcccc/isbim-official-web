apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: isbim-web
  namespace: isbim-web
  labels:
    app.kubernetes.io/name: isbim-web
    app.kubernetes.io/part-of: isbim
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.isbim.com.hk
      secretName: isbim-web-tls
  rules:
    - host: www.isbim.com.hk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: isbim-web
                port:
                  number: 80
